<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConsultaVet | Consultas veterinarias</title>
  <meta name="description" content="Sitio personalizable para consultas veterinarias, agenda de horas y registro de casos clínicos." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --space-1: .25rem; --space-2: .5rem; --space-3: .75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem; --space-16: 4rem; --space-20: 5rem;
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2:#fbfbf9; --color-surface-offset:#edeae5; --color-divider:#dcd9d5; --color-border:#d4d1ca;
      --color-text:#28251d; --color-text-muted:#66645f; --color-text-faint:#8a8882; --color-text-inverse:#f9f8f4;
      --color-primary:#01696f; --color-primary-hover:#0c4e54; --color-primary-highlight:#cedcd8; --color-success:#437a22; --color-error:#a12c7b;
      --radius-sm:.375rem; --radius-md:.5rem; --radius-lg:.75rem; --radius-xl:1rem; --radius-full:9999px;
      --shadow-sm: 0 1px 2px rgb(40 37 29 / 0.06); --shadow-md: 0 8px 24px rgb(40 37 29 / 0.08); --shadow-lg: 0 16px 40px rgb(40 37 29 / 0.12);
      --font-display: 'Instrument Serif', Georgia, serif; --font-body: 'Work Sans', sans-serif;
      --content: 1120px;
    }
    [data-theme="dark"] {
      --color-bg:#171614; --color-surface:#1c1b19; --color-surface-2:#201f1d; --color-surface-offset:#2a2927; --color-divider:#262523; --color-border:#393836;
      --color-text:#ece7df; --color-text-muted:#b8b2aa; --color-text-faint:#918b84; --color-text-inverse:#171614;
      --color-primary:#4f98a3; --color-primary-hover:#227f8b; --color-primary-highlight:#313b3b; --color-success:#6daa45; --color-error:#d163a7;
      --shadow-sm: 0 1px 2px rgb(0 0 0 / 0.2); --shadow-md: 0 8px 24px rgb(0 0 0 / 0.3); --shadow-lg: 0 16px 40px rgb(0 0 0 / 0.4);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-body);font-size:var(--text-base);background:var(--color-bg);color:var(--color-text);line-height:1.6}
    img,svg{max-width:100%;display:block}
    a{text-decoration:none;color:inherit}
    button,input,textarea,select{font:inherit;color:inherit}
    button{cursor:pointer;border:none;background:none}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}
    .container{width:min(calc(100% - 2rem),var(--content));margin-inline:auto}
    .skip-link{position:absolute;left:-9999px;top:auto}
    .skip-link:focus{left:1rem;top:1rem;background:var(--color-surface);padding:.75rem 1rem;border-radius:var(--radius-md);z-index:1000}
    .site-header{position:sticky;top:0;z-index:40;background:color-mix(in srgb, var(--color-bg) 86%, transparent);backdrop-filter: blur(12px);border-bottom:1px solid var(--color-divider)}
    .header-inner{display:flex;align-items:center;justify-content:space-between;padding:var(--space-4) 0;gap:var(--space-4)}
    .brand{display:flex;align-items:center;gap:.9rem;font-weight:700}
    .brand-mark{width:42px;height:42px;padding:.5rem;border-radius:var(--radius-lg);background:var(--color-primary-highlight);color:var(--color-primary)}
    .brand-text small{display:block;font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.14em;color:var(--color-text-muted)}
    .brand-text strong{font-size:var(--text-sm)}
    .nav-links{display:flex;gap:1rem;flex-wrap:wrap;align-items:center}
    .nav-links a{font-size:var(--text-sm);color:var(--color-text-muted)}
    .theme-toggle,.btn{min-height:44px;padding:.85rem 1.1rem;border-radius:var(--radius-full);transition:.18s ease}
    .theme-toggle{border:1px solid var(--color-border);background:var(--color-surface)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.6rem;font-weight:600}
    .btn-primary{background:var(--color-primary);color:var(--color-text-inverse)}
    .btn-primary:hover{background:var(--color-primary-hover)}
    .btn-secondary{background:var(--color-surface);border:1px solid var(--color-border)}
    .hero{padding:clamp(4rem,8vw,7rem) 0}
